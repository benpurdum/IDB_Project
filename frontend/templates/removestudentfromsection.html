{% extends "layout.html" %}
{% block content %}

<div class="title">
    <h1>Remove Student From Section</h1>
</div>

<div class="container">

    <form action="/removestudentfromsection" method="POST">

        <p><label>Student ID:</label>
        <input type="text" name="student_id" /></p>

        <p><label>Course ID:</label>
        <input type="text" name="course_id" /></p>

        <p><label>Section ID:</label>
        <input type="text" name="section_id" /></p>

       <select name="semester">
        <option value="">Select</option>
        <option value="Winter">Winter</option>
        <option value="Fall">Fall</option>
        <option value="Spring">Spring</option>
        <option value="Summer">Summer</option>
        </select> </p>

        <p><label>Year:</label><input type="number" name="year" /></p>


        <p><input type="submit" value="Submit" /></p>

    </form>
</div>


{% endblock %}
