{% extends 'layout.html' %}
{% block content %}

<div class="container">
    <h1>Section Roster</h1>
</div>

<div class="container">

{% if data|length > 0 %}
    <table cellpadding="5" cellspacing="5" class="table table-hover">
        <tr>
            <th>ID</th>
            <th>First</th>
            <th>Middle</th>
            <th>Last</th>
            <th>Second</th>
        </tr>

    {% for row in data %}
    <tr>
        {% for d in row %}
            <td>{{ d }}</td>
        {% endfor %}
    </tr>
    {% endfor %}

    </table>

{% else %}
    <div class="container"><h1>No results found</h1></div>
{% endif %}

</div>

{% endblock %}
