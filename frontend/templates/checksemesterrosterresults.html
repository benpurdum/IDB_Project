{% extends 'layout.html' %}
{% block content %}

<div class="container">
    <h1>Semester Roster</h1>
</div>

<div class="container">

{% if data|length > 0 %}
    <table cellpadding="5" cellspacing="5" class="table table-hover">
        <tr>
            <th>Course ID</th>
            <th>Section ID</th>
        </tr>

    {% for row in data %}

    <tr>
        <td>{{ row[1] }}</td>
        <td>{{ row[2] }}</td>
    </tr>

    {% endfor %}

    </table>

{% else %}
    <div class="container"><h1>No results found</h1></div>
{% endif %}

</div>

{% endblock %}
